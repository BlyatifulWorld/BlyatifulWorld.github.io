<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"/>
        <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"/>
        <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.0/dist/mindar-image.aframe.js"/>
        <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"/>
        <script src="./gesture.js" />
    </head>
    <body>
        <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.001; filterBeta: 10" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" gesture-detector device-orientation-permission-ui="enabled: false">
            <a-assets>
                <a-asset-item id="ShibaInu" src="./Models/SC-11/it.gltf"/>
            </a-assets>
            <a-camera position="0 0 0" look-controls="enabled: false"/>
            <a-entity mindar-image-target="targetIndex: 0" gesture-handler="minScale: 0.25; maxScale: 10" class="clickable">
                <a-gltf-model rotation="0 0.5 0 " position="0 -0.25 0" scale="0.07 0.07 0.07" src="#ShibaInu" animation-mixer>
            </a-entity>
        </a-scene>
    </body>
</html>
